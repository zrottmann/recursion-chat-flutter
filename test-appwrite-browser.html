<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppWrite SDK Test - Trading Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0/dist/iife/sdk.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3>🚀 AppWrite SDK Connection Test</h3>
                    </div>
                    <div class="card-body">
                        <div id="status" class="alert alert-info">
                            🔍 Testing AppWrite connection...
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <h5>Configuration</h5>
                                <ul id="config-list" class="list-group">
                                    <li class="list-group-item">Project ID: <span id="project-id">Loading...</span></li>
                                    <li class="list-group-item">Endpoint: <span id="endpoint">Loading...</span></li>
                                    <li class="list-group-item">SDK Version: <span id="sdk-version">Loading...</span></li>
                                </ul>
                            </div>
                            <div class="col-md-6">
                                <h5>Tests</h5>
                                <ul id="test-results" class="list-group">
                                    <li class="list-group-item" id="client-test">Client Init: <span class="badge bg-secondary">Waiting...</span></li>
                                    <li class="list-group-item" id="account-test">Account Service: <span class="badge bg-secondary">Waiting...</span></li>
                                    <li class="list-group-item" id="database-test">Database Service: <span class="badge bg-secondary">Waiting...</span></li>
                                </ul>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <button onclick="testConnection()" class="btn btn-primary">🔄 Retest Connection</button>
                            <button onclick="testWithDifferentProject()" class="btn btn-warning">🧪 Test Different Project ID</button>
                        </div>
                        
                        <div class="mt-4">
                            <h6>Debug Information:</h6>
                            <pre id="debug-info" class="bg-light p-3" style="font-size: 12px;"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
        const PROJECT_ID = '689bdee000098bd9d55c';
        
        let client;
        let account;
        let databases;

        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.className = `alert alert-${type}`;
            statusEl.innerHTML = message;
        }

        function updateTestResult(testId, status, message = '') {
            const testEl = document.getElementById(testId);
            const badge = testEl.querySelector('.badge');
            
            if (status === 'pass') {
                badge.className = 'badge bg-success';
                badge.textContent = '✅ PASS';
            } else if (status === 'fail') {
                badge.className = 'badge bg-danger';
                badge.textContent = '❌ FAIL';
            } else {
                badge.className = 'badge bg-warning';
                badge.textContent = '⏳ Testing...';
            }
            
            if (message) {
                testEl.title = message;
            }
        }

        function logDebug(message) {
            const debugEl = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            debugEl.textContent += `[${timestamp}] ${message}\n`;
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        async function initializeAppWrite() {
            try {
                logDebug('Initializing AppWrite SDK...');
                
                // Display configuration
                document.getElementById('project-id').textContent = PROJECT_ID;
                document.getElementById('endpoint').textContent = ENDPOINT;
                document.getElementById('sdk-version').textContent = Appwrite.Client.VERSION || '15.0.0';
                
                // Initialize client
                updateTestResult('client-test', 'testing');
                client = new Appwrite.Client()
                    .setEndpoint(ENDPOINT)
                    .setProject(PROJECT_ID);
                
                logDebug(`Client initialized with Project: ${PROJECT_ID}`);
                updateTestResult('client-test', 'pass', 'Client initialized successfully');
                
                // Initialize services
                updateTestResult('account-test', 'testing');
                account = new Appwrite.Account(client);
                logDebug('Account service initialized');
                
                updateTestResult('database-test', 'testing');
                databases = new Appwrite.Databases(client);
                logDebug('Database service initialized');
                
                return true;
            } catch (error) {
                logDebug(`Initialization error: ${error.message}`);
                updateTestResult('client-test', 'fail', error.message);
                return false;
            }
        }

        async function testServices() {
            try {
                // Test Account service
                updateTestResult('account-test', 'testing');
                try {
                    await account.get();
                    updateTestResult('account-test', 'pass', 'Account service working (user not logged in)');
                    logDebug('Account service: Working (401 expected when not logged in)');
                } catch (error) {
                    if (error.code === 401) {
                        updateTestResult('account-test', 'pass', 'Account service working (user not logged in)');
                        logDebug('Account service: Working (401 expected when not logged in)');
                    } else {
                        updateTestResult('account-test', 'fail', error.message);
                        logDebug(`Account service error: ${error.message}`);
                    }
                }
                
                // Test Database service
                updateTestResult('database-test', 'testing');
                try {
                    await databases.listDocuments('trading_post_db', 'items', []);
                    updateTestResult('database-test', 'pass', 'Database service working');
                    logDebug('Database service: Working - able to query collections');
                } catch (error) {
                    if (error.code === 401) {
                        updateTestResult('database-test', 'pass', 'Database service working (authentication required for data)');
                        logDebug('Database service: Working (401 expected for protected collections)');
                    } else {
                        updateTestResult('database-test', 'fail', error.message);
                        logDebug(`Database service error: ${error.message}`);
                    }
                }
                
            } catch (error) {
                logDebug(`Service test error: ${error.message}`);
            }
        }

        async function testConnection() {
            updateStatus('🔄 Testing AppWrite connection...', 'info');
            logDebug('--- Starting connection test ---');
            
            const initSuccess = await initializeAppWrite();
            if (initSuccess) {
                await testServices();
                updateStatus('✅ AppWrite SDK is working! All services initialized correctly.', 'success');
                logDebug('--- Connection test completed successfully ---');
            } else {
                updateStatus('❌ Failed to initialize AppWrite SDK. Check the debug information below.', 'danger');
                logDebug('--- Connection test failed ---');
            }
        }

        async function testWithDifferentProject() {
            const newProjectId = prompt('Enter project ID to test:', PROJECT_ID);
            if (newProjectId && newProjectId !== PROJECT_ID) {
                logDebug(`Testing with different project ID: ${newProjectId}`);
                
                try {
                    const testClient = new Appwrite.Client()
                        .setEndpoint(ENDPOINT)
                        .setProject(newProjectId);
                    
                    const testAccount = new Appwrite.Account(testClient);
                    await testAccount.get();
                    
                    updateStatus(`✅ Project ID ${newProjectId} is valid!`, 'success');
                } catch (error) {
                    if (error.code === 401) {
                        updateStatus(`✅ Project ID ${newProjectId} is valid (authentication working)!`, 'success');
                    } else {
                        updateStatus(`❌ Project ID ${newProjectId} failed: ${error.message}`, 'danger');
                    }
                }
                
                logDebug(`Different project test result: ${newProjectId}`);
            }
        }

        // Auto-run test on page load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 1000);
        });
    </script>
</body>
</html>
