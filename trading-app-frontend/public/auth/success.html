<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful - Trading Post</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .success-icon {
            font-size: 48px;
            color: #28a745;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
        }
        p {
            color: #666;
            margin: 0 0 20px 0;
            font-size: 16px;
            line-height: 1.5;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 14px;
            color: #007bff;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Authentication Successful!</h1>
        <p>You have been successfully authenticated with Trading Post.</p>
        <div class="status">
            <div class="spinner"></div>
            Completing sign in...
        </div>
    </div>

    <script>
        console.log('🔐 [AUTH-SUCCESS] OAuth success page loaded');
        console.log('🔐 [AUTH-SUCCESS] URL:', window.location.href);
        console.log('🔐 [AUTH-SUCCESS] Hash:', window.location.hash);
        console.log('🔐 [AUTH-SUCCESS] Search:', window.location.search);
        
        // Extract OAuth parameters
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        
        // Log all parameters for debugging
        console.log('🔐 [AUTH-SUCCESS] URL params:', Object.fromEntries(urlParams.entries()));
        console.log('🔐 [AUTH-SUCCESS] Hash params:', Object.fromEntries(hashParams.entries()));
        
        // Store success flag for parent window monitoring
        try {
            sessionStorage.setItem('oauth_success', 'true');
            sessionStorage.setItem('oauth_timestamp', Date.now().toString());
            console.log('✅ [AUTH-SUCCESS] Success flag stored in sessionStorage');
        } catch (e) {
            console.log('⚠️ [AUTH-SUCCESS] Could not store in sessionStorage:', e.message);
        }
        
        // Notify parent window (for popup monitoring)
        try {
            if (window.opener) {
                console.log('🔐 [AUTH-SUCCESS] Notifying parent window of success');
                window.opener.postMessage({
                    type: 'oauth_success',
                    provider: 'google',
                    timestamp: Date.now()
                }, window.location.origin);
            }
        } catch (e) {
            console.log('⚠️ [AUTH-SUCCESS] Could not notify parent window:', e.message);
        }
        
        // Close popup after a short delay
        setTimeout(() => {
            console.log('🔐 [AUTH-SUCCESS] Closing popup window');
            if (window.opener) {
                window.close();
            } else {
                // If not in popup, redirect to main app
                window.location.href = '/';
            }
        }, 2000);
    </script>
</body>
</html>
