<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Debug Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { margin-top: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; max-height: 300px; overflow-y: auto; }
        .btn-group { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Marketplace Debug Tool</h1>
        <p>This tool checks why no items are appearing in the marketplace.</p>

        <div class="btn-group mb-2">
            <button id="checkConnection" class="btn btn-primary">1. Check Connection</button>
            <button id="checkAuth" class="btn btn-secondary">2. Check Auth</button>
            <button id="listItems" class="btn btn-info">3. List All Items</button>
            <button id="createTestItem" class="btn btn-success">4. Create Test Item</button>
            <button id="checkCollections" class="btn btn-warning">5. Check Collections</button>
        </div>
        <div class="btn-group mb-3">
            <button id="testMarketplaceQuery" class="btn btn-dark">6. Test Marketplace Query</button>
            <button id="runFullDiagnosis" class="btn btn-danger">🚨 Run Full Diagnosis</button>
        </div>

        <div id="connectionResult" class="debug-section" style="display: none;">
            <h3>Connection Test</h3>
            <div id="connectionContent"></div>
        </div>

        <div id="authResult" class="debug-section" style="display: none;">
            <h3>Authentication Test</h3>
            <div id="authContent"></div>
        </div>

        <div id="itemsResult" class="debug-section" style="display: none;">
            <h3>Items Query Result</h3>
            <div id="itemsContent"></div>
        </div>

        <div id="createResult" class="debug-section" style="display: none;">
            <h3>Test Item Creation</h3>
            <div id="createContent"></div>
        </div>

        <div id="collectionsResult" class="debug-section" style="display: none;">
            <h3>Collections Check</h3>
            <div id="collectionsContent"></div>
        </div>

        <div id="marketplaceResult" class="debug-section" style="display: none;">
            <h3>Marketplace Query Test</h3>
            <div id="marketplaceContent"></div>
        </div>

        <div id="diagnosisResult" class="debug-section" style="display: none;">
            <h3>Full Diagnosis</h3>
            <div id="diagnosisContent"></div>
        </div>

        <div class="debug-section">
            <h3>Console Log</h3>
            <pre id="console"></pre>
        </div>
    </div>

    <script type="module">
        // Import Appwrite
        import { Client, Databases, Account, ID, Query } from 'https://cdn.skypack.dev/appwrite';

        // Configuration
        const CONFIG = {
            endpoint: 'https://cloud.appwrite.io/v1',
            project: 'trading-post-dev',
            database: 'trading_post_db',
            collection: 'items'
        };

        const client = new Client()
            .setEndpoint(CONFIG.endpoint)
            .setProject(CONFIG.project);

        const databases = new Databases(client);
        const account = new Account(client);

        const consoleLog = document.getElementById('console');
        let logCount = 0;

        function log(message, data = null) {
            logCount++;
            const timestamp = new Date().toISOString().substr(11, 8);
            let logMessage = `[${timestamp}] ${message}`;
            if (data) {
                logMessage += '\n' + JSON.stringify(data, null, 2);
            }
            consoleLog.textContent += logMessage + '\n\n';
            consoleLog.scrollTop = consoleLog.scrollHeight;
            console.log(message, data);
        }

        function showSection(sectionId, content, className = '') {
            const section = document.getElementById(sectionId);
            const contentDiv = document.getElementById(sectionId.replace('Result', 'Content'));
            section.style.display = 'block';
            section.className = `debug-section ${className}`;
            contentDiv.innerHTML = content;
        }

        // 1. Check Connection
        document.getElementById('checkConnection').addEventListener('click', async () => {
            log('Testing Appwrite connection...');
            try {
                const health = await fetch(`${CONFIG.endpoint}/health`);
                const healthData = await health.json();
                log('Connection successful', healthData);
                showSection('connectionResult', `
                    <div class="alert alert-success">✅ Connection to Appwrite successful</div>
                    <pre>${JSON.stringify(healthData, null, 2)}</pre>
                `, 'success');
            } catch (error) {
                log('Connection failed', error);
                showSection('connectionResult', `
                    <div class="alert alert-danger">❌ Connection failed: ${error.message}</div>
                `, 'error');
            }
        });

        // 2. Check Auth
        document.getElementById('checkAuth').addEventListener('click', async () => {
            log('Testing authentication...');
            try {
                const user = await account.get();
                log('Authentication successful', { id: user.$id, email: user.email });
                showSection('authResult', `
                    <div class="alert alert-success">✅ User authenticated</div>
                    <p><strong>User ID:</strong> ${user.$id}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Name:</strong> ${user.name || 'Not set'}</p>
                `, 'success');
            } catch (error) {
                log('Authentication failed', error);
                showSection('authResult', `
                    <div class="alert alert-warning">⚠️ Not authenticated: ${error.message}</div>
                    <p>You need to log in to see items in the marketplace.</p>
                `, 'warning');
            }
        });

        // 3. List Items
        document.getElementById('listItems').addEventListener('click', async () => {
            log('Querying items from database...');
            try {
                const response = await databases.listDocuments(
                    CONFIG.database,
                    CONFIG.collection,
                    [
                        Query.orderDesc('$createdAt'),
                        Query.limit(20)
                    ]
                );
                
                log('Items query successful', { 
                    total: response.total, 
                    count: response.documents.length,
                    documents: response.documents
                });

                if (response.documents.length === 0) {
                    showSection('itemsResult', `
                        <div class="alert alert-warning">⚠️ No items found in database</div>
                        <p>Total items in collection: ${response.total}</p>
                        <p>This explains why the marketplace is empty.</p>
                    `, 'warning');
                } else {
                    const itemsList = response.documents.map(item => `
                        <div class="border p-2 mb-2">
                            <strong>${item.title || 'No title'}</strong><br>
                            <small>ID: ${item.$id}</small><br>
                            <small>User: ${item.userId || item.user_id || 'No user'}</small><br>
                            <small>Created: ${item.$createdAt}</small><br>
                            <small>Status: ${item.status || 'No status'}</small>
                        </div>
                    `).join('');

                    showSection('itemsResult', `
                        <div class="alert alert-success">✅ Found ${response.documents.length} items</div>
                        <p>Total items in collection: ${response.total}</p>
                        <h5>Items:</h5>
                        ${itemsList}
                    `, 'success');
                }
            } catch (error) {
                log('Items query failed', error);
                showSection('itemsResult', `
                    <div class="alert alert-danger">❌ Failed to query items: ${error.message}</div>
                    <p>Error code: ${error.code}</p>
                    <p>This might indicate a permissions issue or the collection doesn't exist.</p>
                `, 'error');
            }
        });

        // 4. Create Test Item
        document.getElementById('createTestItem').addEventListener('click', async () => {
            log('Creating test item...');
            try {
                // First check if user is authenticated
                const user = await account.get();
                
                const testItem = {
                    userId: user.$id,
                    title: 'Debug Test Item',
                    description: 'This is a test item created by the debug tool',
                    category: 'electronics',
                    condition: 'good',
                    estimated_value: 25.99,
                    images: [],
                    tags: ['test', 'debug'],
                    status: 'active',
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                const response = await databases.createDocument(
                    CONFIG.database,
                    CONFIG.collection,
                    ID.unique(),
                    testItem
                );

                log('Test item created successfully', response);
                showSection('createResult', `
                    <div class="alert alert-success">✅ Test item created successfully</div>
                    <p><strong>Item ID:</strong> ${response.$id}</p>
                    <p><strong>Title:</strong> ${response.title}</p>
                    <p><strong>User ID:</strong> ${response.userId}</p>
                    <p>Now try refreshing the marketplace to see if it appears.</p>
                `, 'success');
            } catch (error) {
                log('Test item creation failed', error);
                showSection('createResult', `
                    <div class="alert alert-danger">❌ Failed to create test item: ${error.message}</div>
                    <p>Error code: ${error.code}</p>
                `, 'error');
            }
        });

        // 5. Check Collections
        document.getElementById('checkCollections').addEventListener('click', async () => {
            log('Checking database collections...');
            try {
                // Try to get database info
                const response = await databases.listDocuments(CONFIG.database, CONFIG.collection, [Query.limit(1)]);
                log('Collection exists', { collection: CONFIG.collection, accessible: true });
                
                showSection('collectionsResult', `
                    <div class="alert alert-success">✅ Collection '${CONFIG.collection}' is accessible</div>
                    <p>Database: ${CONFIG.database}</p>
                    <p>Collection: ${CONFIG.collection}</p>
                `, 'success');
            } catch (error) {
                log('Collection check failed', error);
                let errorMsg = error.message;
                let suggestion = '';
                
                if (error.code === 404) {
                    suggestion = 'The collection might not exist or has a different name.';
                } else if (error.code === 401) {
                    suggestion = 'Authentication required to access the collection.';
                } else if (error.code === 403) {
                    suggestion = 'Permission denied. Check collection permissions.';
                }

                showSection('collectionsResult', `
                    <div class="alert alert-danger">❌ Collection check failed: ${errorMsg}</div>
                    <p>Error code: ${error.code}</p>
                    <p>${suggestion}</p>
                `, 'error');
            }
        });

        // 6. Test Marketplace Query (exact same query as EnhancedMarketplace)
        document.getElementById('testMarketplaceQuery').addEventListener('click', async () => {
            log('Testing exact marketplace query...');
            try {
                // This is the exact query from EnhancedMarketplace.jsx
                const searchParams = {
                    query: '',
                    category: undefined,
                    status: 'active',
                    limit: 50
                };

                const queries = [Query.limit(searchParams.limit || 50)];
                
                if (searchParams.query) {
                    queries.push(Query.search('title', searchParams.query));
                }
                
                if (searchParams.category) {
                    queries.push(Query.equal('category', [searchParams.category]));
                }
                
                if (searchParams.status) {
                    queries.push(Query.equal('status', [searchParams.status]));
                }

                log('Marketplace query parameters', { searchParams, queries });

                const response = await databases.listDocuments(
                    CONFIG.database,
                    CONFIG.collection,
                    queries
                );

                log('Marketplace query successful', { 
                    total: response.total, 
                    count: response.documents.length,
                    firstItem: response.documents[0]
                });

                const resultsHtml = response.documents.length === 0 ? 
                    `<div class="alert alert-warning">⚠️ Marketplace query returned 0 items with status='active'</div>
                     <p>This explains why the marketplace appears empty.</p>
                     <p>Items might have a different status or the query filters are too restrictive.</p>` :
                    `<div class="alert alert-success">✅ Marketplace query found ${response.documents.length} items</div>
                     <p>Items should be visible in the marketplace.</p>
                     <p>If they're not showing, check the frontend rendering logic.</p>`;

                showSection('marketplaceResult', resultsHtml, response.documents.length > 0 ? 'success' : 'warning');

            } catch (error) {
                log('Marketplace query failed', error);
                showSection('marketplaceResult', `
                    <div class="alert alert-danger">❌ Marketplace query failed: ${error.message}</div>
                    <p>Error code: ${error.code}</p>
                `, 'error');
            }
        });

        // 7. Run Full Diagnosis
        document.getElementById('runFullDiagnosis').addEventListener('click', async () => {
            log('Running full diagnosis...');
            let diagnosisResults = [];
            
            try {
                // Test 1: Connection
                try {
                    await fetch(`${CONFIG.endpoint}/health`);
                    diagnosisResults.push({ test: 'Connection', status: 'pass', message: 'Appwrite is reachable' });
                } catch {
                    diagnosisResults.push({ test: 'Connection', status: 'fail', message: 'Cannot reach Appwrite' });
                }

                // Test 2: Authentication
                try {
                    const user = await account.get();
                    diagnosisResults.push({ test: 'Authentication', status: 'pass', message: `Logged in as ${user.email}` });
                } catch (error) {
                    diagnosisResults.push({ test: 'Authentication', status: 'fail', message: 'Not authenticated' });
                }

                // Test 3: Collection Access
                try {
                    await databases.listDocuments(CONFIG.database, CONFIG.collection, [Query.limit(1)]);
                    diagnosisResults.push({ test: 'Collection Access', status: 'pass', message: 'Can access items collection' });
                } catch (error) {
                    diagnosisResults.push({ test: 'Collection Access', status: 'fail', message: `Cannot access collection: ${error.message}` });
                }

                // Test 4: Item Count
                try {
                    const response = await databases.listDocuments(CONFIG.database, CONFIG.collection, [Query.limit(1)]);
                    const count = response.total;
                    if (count === 0) {
                        diagnosisResults.push({ test: 'Item Count', status: 'warning', message: 'No items in database' });
                    } else {
                        diagnosisResults.push({ test: 'Item Count', status: 'pass', message: `${count} items in database` });
                    }
                } catch {
                    diagnosisResults.push({ test: 'Item Count', status: 'fail', message: 'Cannot count items' });
                }

                // Test 5: Active Items
                try {
                    const response = await databases.listDocuments(CONFIG.database, CONFIG.collection, [
                        Query.equal('status', ['active']),
                        Query.limit(50)
                    ]);
                    const count = response.documents.length;
                    if (count === 0) {
                        diagnosisResults.push({ test: 'Active Items', status: 'warning', message: 'No active items found' });
                    } else {
                        diagnosisResults.push({ test: 'Active Items', status: 'pass', message: `${count} active items found` });
                    }
                } catch (error) {
                    diagnosisResults.push({ test: 'Active Items', status: 'fail', message: `Cannot query active items: ${error.message}` });
                }

                // Generate diagnosis report
                const passCount = diagnosisResults.filter(r => r.status === 'pass').length;
                const failCount = diagnosisResults.filter(r => r.status === 'fail').length;
                const warningCount = diagnosisResults.filter(r => r.status === 'warning').length;

                const resultsList = diagnosisResults.map(result => {
                    const icon = result.status === 'pass' ? '✅' : result.status === 'fail' ? '❌' : '⚠️';
                    const colorClass = result.status === 'pass' ? 'text-success' : result.status === 'fail' ? 'text-danger' : 'text-warning';
                    return `<div class="${colorClass}"><strong>${icon} ${result.test}:</strong> ${result.message}</div>`;
                }).join('');

                const overallStatus = failCount > 0 ? 'error' : warningCount > 0 ? 'warning' : 'success';
                const overallMessage = failCount > 0 ? 'Critical issues found' : 
                                     warningCount > 0 ? 'Issues found that may cause empty marketplace' : 
                                     'All tests passed';

                showSection('diagnosisResult', `
                    <div class="alert alert-${overallStatus === 'error' ? 'danger' : overallStatus === 'warning' ? 'warning' : 'success'}">
                        <strong>Diagnosis Complete:</strong> ${overallMessage}
                    </div>
                    <p><strong>Results:</strong> ${passCount} passed, ${warningCount} warnings, ${failCount} failed</p>
                    <div class="mt-3">${resultsList}</div>
                `, overallStatus);

                log('Full diagnosis completed', diagnosisResults);

            } catch (error) {
                log('Diagnosis failed', error);
                showSection('diagnosisResult', `
                    <div class="alert alert-danger">❌ Diagnosis failed: ${error.message}</div>
                `, 'error');
            }
        });

        // Initial log
        log('Debug tool initialized');
        log('Configuration', CONFIG);
    </script>
</body>
</html>
