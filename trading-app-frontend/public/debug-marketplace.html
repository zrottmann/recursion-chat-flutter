<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Debug Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { margin-top: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; max-height: 300px; overflow-y: auto; }
        .btn-group { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Marketplace Debug Tool</h1>
        <p>This tool checks why no items are appearing in the marketplace.</p>

        <div class="btn-group">
            <button id="checkConnection" class="btn btn-primary">1. Check Connection</button>
            <button id="checkAuth" class="btn btn-secondary">2. Check Auth</button>
            <button id="listItems" class="btn btn-info">3. List All Items</button>
            <button id="createTestItem" class="btn btn-success">4. Create Test Item</button>
            <button id="checkCollections" class="btn btn-warning">5. Check Collections</button>
        </div>

        <div id="connectionResult" class="debug-section" style="display: none;">
            <h3>Connection Test</h3>
            <div id="connectionContent"></div>
        </div>

        <div id="authResult" class="debug-section" style="display: none;">
            <h3>Authentication Test</h3>
            <div id="authContent"></div>
        </div>

        <div id="itemsResult" class="debug-section" style="display: none;">
            <h3>Items Query Result</h3>
            <div id="itemsContent"></div>
        </div>

        <div id="createResult" class="debug-section" style="display: none;">
            <h3>Test Item Creation</h3>
            <div id="createContent"></div>
        </div>

        <div id="collectionsResult" class="debug-section" style="display: none;">
            <h3>Collections Check</h3>
            <div id="collectionsContent"></div>
        </div>

        <div class="debug-section">
            <h3>Console Log</h3>
            <pre id="console"></pre>
        </div>
    </div>

    <script type="module">
        // Import Appwrite
        import { Client, Databases, Account, ID, Query } from 'https://cdn.skypack.dev/appwrite';

        // Configuration
        const CONFIG = {
            endpoint: 'https://cloud.appwrite.io/v1',
            project: 'trading-post-dev',
            database: 'trading_post_db',
            collection: 'items'
        };

        const client = new Client()
            .setEndpoint(CONFIG.endpoint)
            .setProject(CONFIG.project);

        const databases = new Databases(client);
        const account = new Account(client);

        const consoleLog = document.getElementById('console');
        let logCount = 0;

        function log(message, data = null) {
            logCount++;
            const timestamp = new Date().toISOString().substr(11, 8);
            let logMessage = `[${timestamp}] ${message}`;
            if (data) {
                logMessage += '\n' + JSON.stringify(data, null, 2);
            }
            consoleLog.textContent += logMessage + '\n\n';
            consoleLog.scrollTop = consoleLog.scrollHeight;
            console.log(message, data);
        }

        function showSection(sectionId, content, className = '') {
            const section = document.getElementById(sectionId);
            const contentDiv = document.getElementById(sectionId.replace('Result', 'Content'));
            section.style.display = 'block';
            section.className = `debug-section ${className}`;
            contentDiv.innerHTML = content;
        }

        // 1. Check Connection
        document.getElementById('checkConnection').addEventListener('click', async () => {
            log('Testing Appwrite connection...');
            try {
                const health = await fetch(`${CONFIG.endpoint}/health`);
                const healthData = await health.json();
                log('Connection successful', healthData);
                showSection('connectionResult', `
                    <div class="alert alert-success">✅ Connection to Appwrite successful</div>
                    <pre>${JSON.stringify(healthData, null, 2)}</pre>
                `, 'success');
            } catch (error) {
                log('Connection failed', error);
                showSection('connectionResult', `
                    <div class="alert alert-danger">❌ Connection failed: ${error.message}</div>
                `, 'error');
            }
        });

        // 2. Check Auth
        document.getElementById('checkAuth').addEventListener('click', async () => {
            log('Testing authentication...');
            try {
                const user = await account.get();
                log('Authentication successful', { id: user.$id, email: user.email });
                showSection('authResult', `
                    <div class="alert alert-success">✅ User authenticated</div>
                    <p><strong>User ID:</strong> ${user.$id}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Name:</strong> ${user.name || 'Not set'}</p>
                `, 'success');
            } catch (error) {
                log('Authentication failed', error);
                showSection('authResult', `
                    <div class="alert alert-warning">⚠️ Not authenticated: ${error.message}</div>
                    <p>You need to log in to see items in the marketplace.</p>
                `, 'warning');
            }
        });

        // 3. List Items
        document.getElementById('listItems').addEventListener('click', async () => {
            log('Querying items from database...');
            try {
                const response = await databases.listDocuments(
                    CONFIG.database,
                    CONFIG.collection,
                    [
                        Query.orderDesc('$createdAt'),
                        Query.limit(20)
                    ]
                );
                
                log('Items query successful', { 
                    total: response.total, 
                    count: response.documents.length,
                    documents: response.documents
                });

                if (response.documents.length === 0) {
                    showSection('itemsResult', `
                        <div class="alert alert-warning">⚠️ No items found in database</div>
                        <p>Total items in collection: ${response.total}</p>
                        <p>This explains why the marketplace is empty.</p>
                    `, 'warning');
                } else {
                    const itemsList = response.documents.map(item => `
                        <div class="border p-2 mb-2">
                            <strong>${item.title || 'No title'}</strong><br>
                            <small>ID: ${item.$id}</small><br>
                            <small>User: ${item.userId || item.user_id || 'No user'}</small><br>
                            <small>Created: ${item.$createdAt}</small><br>
                            <small>Status: ${item.status || 'No status'}</small>
                        </div>
                    `).join('');

                    showSection('itemsResult', `
                        <div class="alert alert-success">✅ Found ${response.documents.length} items</div>
                        <p>Total items in collection: ${response.total}</p>
                        <h5>Items:</h5>
                        ${itemsList}
                    `, 'success');
                }
            } catch (error) {
                log('Items query failed', error);
                showSection('itemsResult', `
                    <div class="alert alert-danger">❌ Failed to query items: ${error.message}</div>
                    <p>Error code: ${error.code}</p>
                    <p>This might indicate a permissions issue or the collection doesn't exist.</p>
                `, 'error');
            }
        });

        // 4. Create Test Item
        document.getElementById('createTestItem').addEventListener('click', async () => {
            log('Creating test item...');
            try {
                // First check if user is authenticated
                const user = await account.get();
                
                const testItem = {
                    userId: user.$id,
                    title: 'Debug Test Item',
                    description: 'This is a test item created by the debug tool',
                    category: 'electronics',
                    condition: 'good',
                    estimated_value: 25.99,
                    images: [],
                    tags: ['test', 'debug'],
                    status: 'active',
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                const response = await databases.createDocument(
                    CONFIG.database,
                    CONFIG.collection,
                    ID.unique(),
                    testItem
                );

                log('Test item created successfully', response);
                showSection('createResult', `
                    <div class="alert alert-success">✅ Test item created successfully</div>
                    <p><strong>Item ID:</strong> ${response.$id}</p>
                    <p><strong>Title:</strong> ${response.title}</p>
                    <p><strong>User ID:</strong> ${response.userId}</p>
                    <p>Now try refreshing the marketplace to see if it appears.</p>
                `, 'success');
            } catch (error) {
                log('Test item creation failed', error);
                showSection('createResult', `
                    <div class="alert alert-danger">❌ Failed to create test item: ${error.message}</div>
                    <p>Error code: ${error.code}</p>
                `, 'error');
            }
        });

        // 5. Check Collections
        document.getElementById('checkCollections').addEventListener('click', async () => {
            log('Checking database collections...');
            try {
                // Try to get database info
                const response = await databases.listDocuments(CONFIG.database, CONFIG.collection, [Query.limit(1)]);
                log('Collection exists', { collection: CONFIG.collection, accessible: true });
                
                showSection('collectionsResult', `
                    <div class="alert alert-success">✅ Collection '${CONFIG.collection}' is accessible</div>
                    <p>Database: ${CONFIG.database}</p>
                    <p>Collection: ${CONFIG.collection}</p>
                `, 'success');
            } catch (error) {
                log('Collection check failed', error);
                let errorMsg = error.message;
                let suggestion = '';
                
                if (error.code === 404) {
                    suggestion = 'The collection might not exist or has a different name.';
                } else if (error.code === 401) {
                    suggestion = 'Authentication required to access the collection.';
                } else if (error.code === 403) {
                    suggestion = 'Permission denied. Check collection permissions.';
                }

                showSection('collectionsResult', `
                    <div class="alert alert-danger">❌ Collection check failed: ${errorMsg}</div>
                    <p>Error code: ${error.code}</p>
                    <p>${suggestion}</p>
                `, 'error');
            }
        });

        // Initial log
        log('Debug tool initialized');
        log('Configuration', CONFIG);
    </script>
</body>
</html>
