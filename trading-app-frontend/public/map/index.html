<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007bff">
    <meta name="description" content="Trading Post Map - Find local trading opportunities near you">
    
    <!-- Content Security Policy for secure map functionality -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://fonts.googleapis.com;
      font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com;
      img-src 'self' data: blob: https: https://tile.openstreetmap.org https://unpkg.com;
      connect-src 'self' https://tile.openstreetmap.org;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      worker-src 'self' blob:;
      upgrade-insecure-requests;
    ">
    
    <title>Trading Post Map - Local Area</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f8f9fa;
        }
        .map-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            z-index: 1000;
            border-bottom: 1px solid #dee2e6;
            backdrop-filter: blur(10px);
        }
        .map-title {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #212529;
        }
        .back-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1001;
        }
        .back-btn:hover {
            background: #0056b3;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 123, 255, 0.1);
            border-left: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            margin: 16px;
            border-radius: 6px;
            border: 1px solid #f5c6cb;
        }
        
        /* Accessibility enhancements */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        
        .map-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1002;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .control-button {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .control-button:hover {
            background: #e9ecef;
        }
        
        .control-button:focus {
            outline: 2px solid #007bff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div id="trading-post-map-content" role="main" aria-label="Trading Post Map Application">
        <div class="loading" id="map-loading-indicator" aria-live="polite">
            <div class="spinner" role="status" aria-label="Loading map data"></div>
            <p style="margin-top: 16px; color: #6c757d;">Loading map...</p>
        </div>
    </div>

    <!-- Skip to main content link for accessibility -->
    <a href="#trading-post-map-content" class="visually-hidden" id="skip-to-main">Skip to main content</a>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    <script>
        console.log('🗺️ Map page loading...');
        
        function showError(message) {
            const content = document.getElementById('trading-post-map-content');
            content.innerHTML = `
                <div class="error-message" role="alert" aria-live="assertive">
                    <h3 id="error-heading">Map Loading Error</h3>
                    <p id="error-description">${message}</p>
                    <button onclick="location.reload()" 
                            aria-describedby="error-description"
                            style="background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 8px;">
                        Try Again
                    </button>
                    <button onclick="window.location.href='/'" 
                            style="background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 8px; margin-left: 8px;">
                        Back to Home
                    </button>
                </div>
            `;
        }

        function initializeMap() {
            try {
                console.log('🗺️ Initializing Leaflet map...');
                
                // Check if Leaflet is available
                if (typeof L === 'undefined') {
                    throw new Error('Leaflet library not loaded');
                }
                
                const content = document.getElementById('trading-post-map-content');
                content.innerHTML = `
                    <div class="map-container" role="application" aria-label="Interactive Trading Post Map">
                        <div class="map-header">
                            <h1 class="map-title" id="map-page-title">Trading Post - Local Area Map</h1>
                        </div>
                        <button class="back-btn" 
                                onclick="window.location.href='/'"
                                aria-label="Navigate back to Trading Post home page">
                            ← Back to Home
                        </button>
                        <div id="trading-post-leaflet-map" 
                             role="img" 
                             aria-label="Interactive map showing local trading opportunities"
                             aria-describedby="map-page-title">
                        </div>
                        <div class="map-controls" id="map-accessibility-controls">
                            <button class="control-button" 
                                    id="locate-user-btn"
                                    onclick="locateUser()"
                                    aria-label="Center map on your current location"
                                    title="Find my location">
                                📍 My Location
                            </button>
                            <button class="control-button" 
                                    id="reset-view-btn"
                                    onclick="resetMapView()"
                                    aria-label="Reset map view to default"
                                    title="Reset map view">
                                🔄 Reset View
                            </button>
                        </div>
                    </div>
                `;

                // Initialize map with a default location (adjust as needed)
                const map = L.map('trading-post-leaflet-map').setView([40.7128, -74.0060], 13); // New York City default
                
                // Store map reference globally for accessibility controls
                window.tradingPostMap = map;
                window.defaultLocation = [40.7128, -74.0060];

                // Add OpenStreetMap tiles
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© <a href="http://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>',
                    alt: 'Map tiles from OpenStreetMap'
                }).addTo(map);

                // Add a sample marker
                const marker = L.marker([40.7128, -74.0060]).addTo(map);
                marker.bindPopup('<b>Trading Post</b><br>Welcome to the community marketplace!')
                      .openPopup();

                // Try to get user location
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        function(position) {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            
                            console.log('📍 User location found:', lat, lng);
                            
                            // Update map view to user location
                            map.setView([lat, lng], 15);
                            
                            // Remove default marker and add user location marker
                            map.removeLayer(marker);
                            const userMarker = L.marker([lat, lng]).addTo(map);
                            userMarker.bindPopup('<b>Your Location</b><br>Trading opportunities near you!').openPopup();
                        },
                        function(error) {
                            console.warn('📍 Geolocation error:', error.message);
                            // Keep default location
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 300000 // 5 minutes
                        }
                    );
                }

                console.log('✅ Map initialized successfully');

            } catch (error) {
                console.error('🗺️ Map initialization error:', error);
                showError('Failed to initialize map: ' + error.message);
            }
        }

        // Accessibility control functions
        function locateUser() {
            if (!window.tradingPostMap) {
                console.error('Map not initialized');
                return;
            }
            
            if (navigator.geolocation) {
                const btn = document.getElementById('locate-user-btn');
                btn.textContent = '📍 Locating...';
                btn.disabled = true;
                
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        window.tradingPostMap.setView([lat, lng], 15);
                        btn.textContent = '📍 My Location';
                        btn.disabled = false;
                        
                        // Announce location update for screen readers
                        const announcement = document.createElement('div');
                        announcement.setAttribute('aria-live', 'polite');
                        announcement.setAttribute('aria-atomic', 'true');
                        announcement.className = 'visually-hidden';
                        announcement.textContent = 'Map centered on your current location';
                        document.body.appendChild(announcement);
                        setTimeout(() => document.body.removeChild(announcement), 1000);
                    },
                    function(error) {
                        console.warn('Geolocation error:', error.message);
                        btn.textContent = '📍 Location Error';
                        btn.disabled = false;
                        setTimeout(() => {
                            btn.textContent = '📍 My Location';
                        }, 2000);
                    }
                );
            } else {
                alert('Geolocation is not supported by this browser');
            }
        }

        function resetMapView() {
            if (!window.tradingPostMap || !window.defaultLocation) {
                console.error('Map not initialized');
                return;
            }
            
            window.tradingPostMap.setView(window.defaultLocation, 13);
            
            // Announce view reset for screen readers
            const announcement = document.createElement('div');
            announcement.setAttribute('aria-live', 'polite');
            announcement.setAttribute('aria-atomic', 'true');
            announcement.className = 'visually-hidden';
            announcement.textContent = 'Map view reset to default location';
            document.body.appendChild(announcement);
            setTimeout(() => document.body.removeChild(announcement), 1000);
        }

        // Initialize map when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🗺️ DOM loaded, checking Leaflet...');
            
            // Check if Leaflet is available, if not wait a bit
            if (typeof L !== 'undefined') {
                initializeMap();
            } else {
                console.log('🗺️ Waiting for Leaflet to load...');
                setTimeout(function() {
                    if (typeof L !== 'undefined') {
                        initializeMap();
                    } else {
                        showError('Leaflet library failed to load. Please check your internet connection.');
                    }
                }, 2000);
            }
        });

        // Handle page errors
        window.addEventListener('error', function(e) {
            console.error('🗺️ Page error:', e.error);
            showError('An error occurred: ' + e.message);
        });
    </script>
</body>
</html>
