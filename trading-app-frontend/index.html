    <meta name="pragma" content="no-cache">

    <meta name="format-detection" content="telephone=no" />

    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #f8f9fa;
        color: #212529;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        min-height: 100vh;
        width: 100%;
      }
      /* Loading spinner */
      .loading-spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(0, 123, 255, 0.1);
        border-left: 4px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        will-change: transform;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- Extension Compatibility Fixes -->
    <script>
      // Enhanced MutationObserver protection for browser extensions
      (function() {
        'use strict';
        
        if (typeof window === 'undefined') return;
        
        // Store original MutationObserver
        const OriginalMutationObserver = window.MutationObserver;
        if (!OriginalMutationObserver) return;
        
        // Enhanced MutationObserver wrapper
        window.MutationObserver = function(callback) {
          if (typeof callback !== 'function') {
            console.warn('[Extension Protection] Invalid MutationObserver callback');
            return new OriginalMutationObserver(function() {});
          }
          
          const observer = new OriginalMutationObserver(function(mutations, obs) {
            try {
              // Filter out extension-related mutations
              const safeMutations = mutations.filter(function(mutation) {
                const target = mutation.target;
                if (!target || typeof target !== 'object' || !target.nodeType) {
                  return false;
                }
                
                // Skip extension elements
                if (target.id && (
                  target.id.includes('extension') ||
                  target.id.includes('chrome-extension') ||
                  target.id.includes('web-client-content-script')
                )) {
                  return false;
                }
                
                if (target.classList && (
                  target.classList.contains('chrome-extension') ||
                  target.classList.contains('extension-element') ||
                  target.classList.contains('web-client-content-script')
                )) {
                  return false;
                }
                
                return true;
              });
              
              if (safeMutations.length > 0) {
                callback(safeMutations, obs);
              }
            } catch (error) {
              console.warn('[Extension Protection] MutationObserver callback error suppressed:', error.message);
            }
          });
          
          // Enhanced observe method with comprehensive validation
          const originalObserve = observer.observe;
          observer.observe = function(target, options) {
            try {
              // Comprehensive target validation
              if (!target) {
                console.warn('[Extension Protection] MutationObserver target is null/undefined');
                return;
              }
              
              if (typeof target !== 'object') {
                console.warn('[Extension Protection] MutationObserver target is not an object');
                return;
              }
              
              if (!target.nodeType || typeof target.nodeType !== 'number') {
                console.warn('[Extension Protection] MutationObserver target is not a valid DOM Node');
                return;
              }
              
              if (target.nodeType < 1 || target.nodeType > 12) {
                console.warn('[Extension Protection] MutationObserver target has invalid nodeType:', target.nodeType);
                return;
              }
              
              // Skip extension elements
              if (target.id && (
                target.id.includes('extension') ||
                target.id.includes('chrome-extension') ||
                target.id.includes('web-client-content-script')
              )) {
                console.warn('[Extension Protection] Skipping extension element observation');
                return;
              }
              
              if (target.classList && (
                target.classList.contains('chrome-extension') ||
                target.classList.contains('extension-element') ||
                target.classList.contains('web-client-content-script')
              )) {
                console.warn('[Extension Protection] Skipping extension element observation');
                return;
              }
              
              // Safe default options
              const safeOptions = Object.assign({
                childList: true,
                subtree: false,
                attributes: false,
                attributeOldValue: false,
                characterData: false,
                characterDataOldValue: false
              }, options || {});
              
              return originalObserve.call(this, target, safeOptions);
            } catch (error) {
              console.warn('[Extension Protection] MutationObserver observe error suppressed:', error.message);
            }
          };
          
          return observer;
        };
        
        // Copy static properties
        Object.setPrototypeOf(window.MutationObserver, OriginalMutationObserver);
        Object.defineProperty(window.MutationObserver, 'name', { value: 'MutationObserver' });
        
        console.log('[Extension Protection] Enhanced MutationObserver protection loaded');
      })();
      
      // Enhanced console error suppression for extensions
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        
        const suppressPatterns = [
          /Failed to execute 'observe' on 'MutationObserver'/,
          /parameter 1 is not of type 'Node'/,
          /web-client-content-script/,
          /chrome-extension:/,
          /extension.*content.*script/i
        ];
        
        console.error = function() {
          const message = Array.prototype.join.call(arguments, ' ');
          if (!suppressPatterns.some(pattern => pattern.test(message))) {
            originalError.apply(console, arguments);
          }
        };
        
        console.warn = function() {
          const message = Array.prototype.join.call(arguments, ' ');
          if (!suppressPatterns.some(pattern => pattern.test(message))) {
            originalWarn.apply(console, arguments);
          }
        };
        
        console.log('[Extension Protection] Console error suppression loaded');
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p style="margin-top: 16px; color: #6c757d;">Loading Trading Post...</p>
        <p id="loading-hint" style="margin-top: 8px; color: #6c757d; font-size: 12px; display: none;">This may take a moment on mobile networks...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // URGENT OAuth Callback Handler - Check if we're on /auth/callback path
      (function() {
        var currentPath = window.location.pathname;
        var currentHash = window.location.hash;
        var currentSearch = window.location.search;
        
        console.log('[OAUTH-CHECK] Current path:', currentPath);
        console.log('[OAUTH-CHECK] Current hash:', currentHash);
        console.log('[OAUTH-CHECK] Current search:', currentSearch);
        
        // Check if we're on OAuth callback URL
        if (currentPath === '/auth/callback' || currentPath === '/auth/callback/' || 
            currentPath === '/oauth/callback' || currentPath === '/oauth/callback/') {
          console.log('[OAUTH-REDIRECT] Detected OAuth callback URL!');
          console.log('[OAUTH-REDIRECT] Redirecting to homepage with params...');
          
          // Store OAuth params
          try {
            sessionStorage.setItem('oauth_callback_path', currentPath);
            sessionStorage.setItem('oauth_callback_search', currentSearch);
            sessionStorage.setItem('oauth_callback_hash', currentHash);
            sessionStorage.setItem('oauth_callback_timestamp', new Date().toISOString());
            console.log('[OAUTH-REDIRECT] Stored OAuth params in sessionStorage');
          } catch (e) {
            console.error('[OAUTH-REDIRECT] Failed to store in sessionStorage:', e);
          }
          
          // Build redirect URL
          var redirectUrl = '/' + currentSearch + currentHash;
          console.log('[OAUTH-REDIRECT] Redirecting to:', redirectUrl);
          
          // IMMEDIATE redirect
          window.location.replace(redirectUrl);
          
          // Prevent further execution
          return;
        }
      })();
      
      // Enhanced mobile compatibility checks
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      var isChrome = /Chrome/.test(navigator.userAgent);
      var isSafari = /Safari/.test(navigator.userAgent) && !isChrome;
      
      console.log('Mobile Detection:', {
        isMobile: isMobile,
        isChrome: isChrome,
        isSafari: isSafari,
        userAgent: navigator.userAgent
      });
      
      // Show mobile loading hint after 3 seconds
      if (isMobile) {
        setTimeout(function() {
          var hint = document.getElementById('loading-hint');
          if (hint) {
            hint.style.display = 'block';
          }
        }, 3000);
      }

      // Enhanced error handling for mobile
      window.addEventListener('error', function(e) {
        console.error('JavaScript Error:', e.error);
        console.error('Error details:', {
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
          error: e.error
        });
        
        // Only show error message if it's a critical error
        if (e.error && !e.filename.includes('socket.io')) {
          setTimeout(function() {
            var root = document.getElementById('root');
            if (root && root.innerHTML.includes('Loading Trading Post')) {
              root.innerHTML = '<div style="padding: 20px; text-align: center; color: #212529;"><h2>Loading Error</h2><p>Error: ' + e.message + '</p><p>Please try refreshing the page or check your internet connection.</p><button onclick="location.reload()" style="padding: 10px 20px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 5px;">Refresh</button></div>';
            }
          }, isMobile ? 30000 : 15000);
        }
      });

      // Add unhandled promise rejection handling
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled Promise Rejection:', e.reason);
        if (isMobile) {
          e.preventDefault();
        }
      });
      
      // Loading timeout check
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.querySelector && root.querySelector('.loading-spinner')) {
          console.warn('App is taking longer than expected to load');
          if (isMobile) {
            setTimeout(function() {
              var root = document.getElementById('root');
              if (root && root.querySelector && root.querySelector('.loading-spinner')) {
                root.innerHTML = '<div style="padding: 20px; text-align: center; color: #212529;"><h2>Connection Timeout</h2><p>The app is taking longer than usual to load.</p><p>This may be due to a slow network connection.</p><button onclick="location.reload()" style="padding: 10px 20px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 5px;">Try Again</button></div>';
              }
            }, 30000);
          }
        }
      }, isMobile ? 20000 : 10000);
    </script>
  </body>
