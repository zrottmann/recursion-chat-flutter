<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Post - Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-bottom: 1rem;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trading Post</h1>
        <div class="spinner"></div>
        <p>Loading application...</p>
        <p style="margin-top: 2rem; font-size: 0.9em;">
            If you're not redirected, <a href="#" onclick="accessApp()">click here</a>
        </p>
    </div>
    
    <script>
        // Appwrite configuration
        const APPWRITE_ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
        const APPWRITE_PROJECT_ID = '689bdee000098bd9d55c';
        
        function accessApp() {
            // For now, redirect to Appwrite Console
            window.location.href = `https://cloud.appwrite.io/console/project-${APPWRITE_PROJECT_ID}`;
        }
        
        // Auto-redirect after 2 seconds
        setTimeout(accessApp, 2000);
    </script>
</body>
</html>
